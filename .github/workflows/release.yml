name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.6.0)'
        required: true
        default: 'v1.6.1'

permissions:
  contents: write

env:
  BINARY_PREFIX: monitor-lite-api

jobs:
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Resolve tag and version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  build-ui:
    name: Build frontend
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        working-directory: ui
        env:
          VITE_APP_VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          npm ci
          npm pkg set "version=${VITE_APP_VERSION}"
          npm run build-only

      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist
          retention-days: 1

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: [resolve-version, build-ui]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download UI artifact
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui/dist

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          OUTPUT="dist/${{ env.BINARY_PREFIX }}-${GOOS}-${GOARCH}${{ matrix.ext }}"
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags="-s -w -X github.com/aiqoder/monitor-lite-api/internal/version.Version=${VERSION}" \
            -o "$OUTPUT" \
            .

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          retention-days: 1

  release:
    name: Create Release
    needs: [resolve-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: binary-*
          merge-multiple: true

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp dist/${{ env.BINARY_PREFIX }}-* release/
          cp scripts/install.sh release/install.sh
          cp scripts/install-macos.sh release/install-macos.sh
          cp scripts/install.ps1 release/install.ps1
          chmod +x release/install.sh release/install-macos.sh
          cd release && sha256sum ${{ env.BINARY_PREFIX }}-* > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag }}
          name: monitor-lite-api ${{ needs.resolve-version.outputs.tag }}
          generate_release_notes: true
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
